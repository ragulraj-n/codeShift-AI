services:
  - type: web
    name: codeshift-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_CODE_MODEL
        value: Qwen/Qwen2.5-Coder-32B-Instruct
